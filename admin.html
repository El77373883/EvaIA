<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eva Admin ULTIMATE - Conversación con Memoria Total</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* TEMAS */
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; transition: all 0.3s; }
        body.light { background: #F5F7FB; color: #1e293b; }
        body.dark { background: #0f172a; color: #e2e8f0; }
        
        body.dark .card { background: #1e293b; border-color: #334155; }
        body.dark .entry-item { background: #0f172a; }
        body.dark .stat-card { background: #1e293b; }
        body.dark .chat-messages { background: #0f172a; }
        body.dark .bubble.bot { background: #334155; color: #e2e8f0; }
        
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .dashboard { display: flex; gap: 24px; flex-wrap: wrap; }
        .admin-panel { flex: 2.5; min-width: 300px; }
        .chat-simulator { flex: 1.5; min-width: 350px; background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); position: sticky; top: 20px; height: fit-content; max-height: 85vh; display: flex; flex-direction: column; }
        
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: #f1f5f9; border-radius: 16px; padding: 12px; text-align: center; font-weight: bold; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
        .btn { padding: 8px 16px; border-radius: 40px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.1s; background: #e2e8f0; color: #1e293b; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-sm { padding: 5px 12px; font-size: 11px; }
        .search-box { width: 100%; padding: 10px 16px; border-radius: 40px; border: 1px solid #cbd5e1; margin-bottom: 16px; }
        .entry-item { background: #f8fafc; border-radius: 16px; padding: 14px; margin-bottom: 12px; border-left: 4px solid #3b82f6; cursor: move; transition: 0.1s; }
        .entry-item.dragging { opacity: 0.5; }
        .model-badge { padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: bold; }
        .badge-eva { background: #fee2e2; color: #b91c1c; }
        .badge-selene { background: #e0e7ff; color: #3730a3; }
        .badge-nyx { background: #1e1b4b; color: #cbd5e1; }
        .badge-aria { background: #d1fae5; color: #065f46; }
        
        .chat-header { background: #3b82f6; color: white; padding: 16px; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: #fafafa; min-height: 400px; max-height: 500px; }
        .message { margin-bottom: 16px; display: flex; flex-direction: column; }
        .user-msg { align-items: flex-end; }
        .bot-msg { align-items: flex-start; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; }
        .user-msg .bubble { background: #3b82f6; color: white; border-bottom-right-radius: 4px; }
        .bot-msg .bubble { background: #e2e8f0; color: #1e293b; border-bottom-left-radius: 4px; }
        .chat-input-area { display: flex; padding: 12px; gap: 8px; background: white; border-top: 1px solid #e2e8f0; }
        .chat-input { flex: 1; padding: 10px; border-radius: 24px; border: 1px solid #cbd5e1; outline: none; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 20px; border-radius: 40px; z-index: 1000; animation: fadeInOut 2s ease; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(20px); } 15% { opacity: 1; transform: translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateY(20px); } }
        
        .view-toggle { display: flex; gap: 8px; }
        .tag { background: #e2e8f0; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        @media (max-width: 1000px) { .dashboard { flex-direction: column; } .chat-simulator { position: static; } }
    </style>
</head>
<body class="light">
<div class="container">
    <div class="flex-between">
        <h1>🧠 Eva ULTIMATE - Memoria Total + Contexto</h1>
        <div class="view-toggle">
            <button class="btn btn-sm" onclick="toggleTheme()">🌓 Tema</button>
            <button class="btn btn-sm" onclick="toggleView()">🃏 Vista tarjeta/lista</button>
            <button class="btn btn-sm" onclick="undo()">↩️ Deshacer</button>
            <button class="btn btn-sm" onclick="redo()">↪️ Rehacer</button>
            <button class="btn btn-sm" onclick="exportAllFormats()">📎 Exportar</button>
        </div>
    </div>
    
    <div class="dashboard">
        <!-- PANEL ADMIN -->
        <div class="admin-panel">
            <div class="stats-grid" id="statsPanel"></div>
            
            <div class="card">
                <div class="flex-between">
                    <h3>➕ Agregar entrada</h3>
                    <select id="modelSelect"><option value="eva">Eva</option><option value="selene">Selene</option><option value="nyx">Nyx</option><option value="aria">Aria</option></select>
                </div>
                <label>Keywords (separadas por coma)</label>
                <textarea id="newKeywords" rows="2" placeholder="hola, buenas, hey"></textarea>
                <label>Respuesta (puede incluir {nombre} o {recuerdo})</label>
                <textarea id="newResponse" rows="3" placeholder="Hola {nombre}, la última vez dijiste {recuerdo}"></textarea>
                <label>Respuestas alternativas (separadas por | para aleatorio)</label>
                <textarea id="newAlternatives" rows="2" placeholder="Opción 1 | Opción 2 | Opción 3"></textarea>
                <label>🏷️ Etiqueta / Intención</label>
                <select id="newIntent">
                    <option value="saludo">saludo</option><option value="despedida">despedida</option><option value="pregunta">pregunta</option>
                    <option value="queja">queja</option><option value="broma">broma</option><option value="consuelo">consuelo</option><option value="general">general</option>
                </select>
                <label>⭐ Prioridad (1-10)</label>
                <input type="number" id="newPriority" min="1" max="10" value="5">
                <label>🔗 Requiere contexto previo (keyword que debe haber aparecido antes)</label>
                <input type="text" id="newRequires" placeholder="ej: nombre, pregunta_anterior">
                <div class="flex-between" style="margin-top:16px">
                    <button class="btn btn-primary" onclick="addEntry()">✅ Guardar</button>
                    <button class="btn btn-outline" onclick="importCSV()">📁 Importar CSV</button>
                    <button class="btn btn-outline" onclick="createBackup()">💾 Backup</button>
                </div>
            </div>
            
            <div class="card">
                <div class="flex-between">
                    <h3>📋 Entradas <span id="totalCount">0</span></h3>
                    <div>
                        <input type="text" id="filterInput" placeholder="🔍 Buscar..." class="search-box" style="width:200px;margin:0" oninput="renderEntries()">
                        <select id="filterModel" onchange="renderEntries()"><option value="all">Todos</option><option value="eva">Eva</option><option value="selene">Selene</option><option value="nyx">Nyx</option><option value="aria">Aria</option></select>
                        <button class="btn btn-danger btn-sm" onclick="deleteSelected()">🗑️ Borrar selec</button>
                    </div>
                </div>
                <div id="entriesList"></div>
            </div>
        </div>
        
        <!-- CHAT CON MEMORIA PERSISTENTE -->
        <div class="chat-simulator">
            <div class="chat-header">
                💬 Chat con Memoria Persistente
                <div>
                    <button class="btn btn-sm" style="background:#ffffff30" onclick="resetMemory()">🔄 Reset</button>
                    <button class="btn btn-sm" style="background:#ffffff30" onclick="showMemory()">🧠 Ver contexto</button>
                    <button class="btn btn-sm" style="background:#ffffff30" onclick="setUserName()">👤 Nombre</button>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Escribe algo... (el bot recuerda toda la conversación)">
                <button class="btn btn-primary" onclick="sendMessage()">Enviar</button>
            </div>
            <div style="padding:8px 16px; font-size:11px; background:#f1f5f9; border-top:1px solid #e2e8f0; display:flex; justify-content:space-between">
                <span>😊 Estado: <span id="moodDisplay">neutral</span></span>
                <span>💬 Turnos: <span id="turnCount">0</span></span>
                <span>⭐ Respuestas buenas/malas: <span id="ratingStats">0/0</span></span>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== ESTRUCTURA AVANZADA ====================
    let historyStack = []; let futureStack = [];
    let viewMode = 'list'; // list o cards
    
    function getEntries() { return JSON.parse(localStorage.getItem('eva_ultimate') || '[]'); }
    function saveEntries(entries, saveToHistory=true) { 
        if(saveToHistory) { historyStack.push(JSON.parse(localStorage.getItem('eva_ultimate') || '[]')); futureStack=[]; }
        localStorage.setItem('eva_ultimate', JSON.stringify(entries)); 
        renderEntries(); updateStats(); 
        showToast("✅ Guardado");
    }
    function undo() { if(historyStack.length) { let prev=historyStack.pop(); futureStack.push(getEntries()); saveEntries(prev, false); } }
    function redo() { if(futureStack.length) { let next=futureStack.pop(); historyStack.push(getEntries()); saveEntries(next, false); } }
    
    // Memoria de conversación PERSISTENTE
    let conversationMemory = JSON.parse(localStorage.getItem('conv_memory') || JSON.stringify({
        userId: "user_" + Math.random().toString(36).substr(2,6),
        history: [],
        userMood: "neutral",
        userName: "amigo",
        lastIntent: null,
        contextVars: {},
        turnCount: 0,
        ratings: { good:0, bad:0 }
    }));
    
    function saveMemory() { localStorage.setItem('conv_memory', JSON.stringify(conversationMemory)); updateUI(); }
    
    function updateUI() {
        document.getElementById('moodDisplay').innerText = conversationMemory.userMood;
        document.getElementById('turnCount').innerText = conversationMemory.turnCount;
        document.getElementById('ratingStats').innerText = `${conversationMemory.ratings.good}/${conversationMemory.ratings.bad}`;
    }
    
    function resetMemory() { 
        conversationMemory = { userId: conversationMemory.userId, history: [], userMood: "neutral", userName: "amigo", lastIntent: null, contextVars: {}, turnCount: 0, ratings: { good:0, bad:0 } };
        saveMemory(); 
        document.getElementById('chatMessages').innerHTML = '<div class="message bot-msg"><div class="bubble">🧠 Memoria reiniciada. Hablemos de nuevo.</div></div>';
        showToast("Memoria borrada");
    }
    
    function setUserName() { let name=prompt("¿Cómo te llamas?", conversationMemory.userName); if(name) { conversationMemory.userName=name; saveMemory(); showToast(`Hola ${name}`); } }
    function showMemory() { alert("📜 Contexto:\n" + JSON.stringify(conversationMemory.history.slice(-8), null, 2) + "\n\nVariables: "+JSON.stringify(conversationMemory.contextVars)); }
    
    // Sistema de respuesta con contexto + variables + memoria
    function getBestResponse(userMessage) {
        let entries = getEntries();
        let msg = userMessage.toLowerCase();
        conversationMemory.turnCount++;
        
        // Detectar sentimiento
        if(msg.includes("triste")||msg.includes("mal")||msg.includes("deprimido")) conversationMemory.userMood = "triste";
        else if(msg.includes("feliz")||msg.includes("genial")||msg.includes("alegre")) conversationMemory.userMood = "feliz";
        else if(msg.includes("enojado")||msg.includes("odio")||msg.includes("molesto")) conversationMemory.userMood = "enojado";
        
        // Guardar mensaje usuario
        conversationMemory.history.push({ role: "user", content: userMessage, timestamp: Date.now(), mood: conversationMemory.userMood });
        
        // Extraer variables (ej: "mi nombre es Juan" -> guarda Juan)
        let nameMatch = userMessage.match(/mi nombre es (\w+)/i);
        if(nameMatch) conversationMemory.userName = nameMatch[1];
        if(userMessage.match(/llamame (\w+)/i)) conversationMemory.userName = RegExp.$1;
        
        // Buscar entradas que coincidan
        let matches = entries.filter(e => e.keywords.some(kw => msg.includes(kw.toLowerCase())));
        
        // Filtrar por contexto requerido
        matches = matches.filter(e => {
            if(!e.requires) return true;
            let reqWords = e.requires.split(',');
            let historyText = conversationMemory.history.slice(-5).map(h=>h.content).join(' ').toLowerCase();
            return reqWords.some(r => historyText.includes(r.trim()));
        });
        
        // Ordenar por prioridad y favoritos
        matches.sort((a,b) => (b.priority||0) - (a.priority||0));
        
        let responseText = "No tengo una respuesta específica. ¿Puedes decirlo de otra forma? (Agrégalo en el panel admin)";
        if(matches.length) {
            let selected = matches[0];
            conversationMemory.lastIntent = selected.intent;
            // Elegir respuesta aleatoria si tiene alternativas
            if(selected.alternatives && selected.alternatives.length) {
                let alts = selected.alternatives.split('|');
                responseText = alts[Math.floor(Math.random()*alts.length)];
            } else {
                responseText = selected.response;
            }
            // Reemplazar variables
            responseText = responseText.replace(/{nombre}/gi, conversationMemory.userName);
            responseText = responseText.replace(/{recuerdo}/gi, conversationMemory.history.slice(-3).map(h=>h.content).join(' ').slice(0,50));
            // Reemplazar variables personalizadas
            for(let [k,v] of Object.entries(conversationMemory.contextVars)) {
                responseText = responseText.replace(new RegExp(`{${k}}`,'gi'), v);
            }
        }
        
        conversationMemory.history.push({ role: "bot", content: responseText, timestamp: Date.now(), intent: conversationMemory.lastIntent });
        if(conversationMemory.history.length > 30) conversationMemory.history = conversationMemory.history.slice(-25);
        saveMemory();
        return responseText;
    }
    
    async function sendMessage() {
        let input = document.getElementById('chatInput');
        let msg = input.value.trim();
        if(!msg) return;
        addMessage("user", msg);
        input.value = '';
        let response = getBestResponse(msg);
        setTimeout(() => addMessage("bot", response), 200);
    }
    
    function addMessage(role, text) {
        let container = document.getElementById('chatMessages');
        let div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user-msg' : 'bot-msg'}`;
        div.innerHTML = `<div class="bubble">${escapeHtml(text)}<br><span style="font-size:9px;opacity:0.6">${new Date().toLocaleTimeString()}</span></div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        if(role === 'bot') {
            // Mini feedback
            let good = confirm("¿Esta respuesta fue buena? (OK=Buena / Cancel=Mala)");
            if(good) { conversationMemory.ratings.good++; saveMemory(); showToast("👍 Gracias por el feedback"); }
            else { conversationMemory.ratings.bad++; saveMemory(); }
        }
    }
    
    // CRUD entradas
    let selectedIds = new Set();
    
    function addEntry() {
        let keywordsRaw = document.getElementById('newKeywords').value.trim();
        let response = document.getElementById('newResponse').value.trim();
        let model = document.getElementById('modelSelect').value;
        let intent = document.getElementById('newIntent').value;
        let priority = parseInt(document.getElementById('newPriority').value);
        let requires = document.getElementById('newRequires').value.trim();
        let alternatives = document.getElementById('newAlternatives').value.trim();
        if(!keywordsRaw || !response) { showToast("❌ Llena keywords y respuesta"); return; }
        let keywords = keywordsRaw.split(',').map(k=>k.trim().toLowerCase());
        let entries = getEntries();
        entries.push({ id: Date.now(), keywords, response, model, intent, priority, requires, alternatives, favorite: false, created: new Date().toISOString() });
        saveEntries(entries);
        document.getElementById('newKeywords').value = '';
        document.getElementById('newResponse').value = '';
        document.getElementById('newAlternatives').value = '';
        document.getElementById('newRequires').value = '';
        showToast("✅ Entrada agregada");
    }
    
    function deleteEntry(id) { let entries = getEntries().filter(e=>e.id!==id); saveEntries(entries); }
    function toggleFavorite(id) { let entries = getEntries(); let e=entries.find(e=>e.id===id); if(e) e.favorite=!e.favorite; saveEntries(entries); }
    function duplicateEntry(id) { let entries = getEntries(); let orig=entries.find(e=>e.id===id); if(orig){ entries.push({...orig, id:Date.now(), keywords:[...orig.keywords], response:orig.response+" (copia)"}); saveEntries(entries); } }
    
    let dragSrc = null;
    function handleDragStart(e, idx) { dragSrc=idx; e.dataTransfer.effectAllowed='move'; }
    function handleDrop(e, idx) { if(dragSrc!==null && dragSrc!==idx){ let entries=getEntries(); let temp=entries[dragSrc]; entries[dragSrc]=entries[idx]; entries[idx]=temp; saveEntries(entries,true); } dragSrc=null; }
    
    function renderEntries() {
        let entries = getEntries();
        let filter = document.getElementById('filterInput').value.toLowerCase();
        let modelFilter = document.getElementById('filterModel').value;
        let filtered = entries.filter(e=>e.keywords.join(' ').toLowerCase().includes(filter) && (modelFilter==='all'||e.model===modelFilter));
        document.getElementById('totalCount').innerText = filtered.length;
        let listDiv = document.getElementById('entriesList');
        if(!filtered.length){ listDiv.innerHTML='<div class="empty">📭 Sin entradas</div>'; return; }
        listDiv.innerHTML = filtered.map((e,i)=>`
            <div class="entry-item" draggable="true" ondragstart="handleDragStart(event,${i})" ondragover="event.preventDefault()" ondrop="handleDrop(event,${i})">
                <div class="flex-between">
                    <div><span class="model-badge badge-${e.model}">${e.model.toUpperCase()}</span> <span class="tag">${e.intent||'general'}</span> ⭐${e.priority||5} <span onclick="toggleFavorite(${e.id})" style="cursor:pointer">${e.favorite?'★':'☆'}</span></div>
                    <div><input type="checkbox" onchange="toggleSelect(${e.id}, this.checked)"> <button class="btn btn-sm" onclick="duplicateEntry(${e.id})">📑</button> <button class="btn btn-sm btn-danger" onclick="deleteEntry(${e.id})">🗑</button></div>
                </div>
                <div><strong>🔑</strong> ${e.keywords.join(', ')}</div>
                <div><strong>💬</strong> ${e.response.substring(0,80)}${e.response.length>80?'…':''}</div>
                ${e.requires?`<div><strong>🔗 Requiere:</strong> ${e.requires}</div>`:''}
            </div>
        `).join('');
    }
    
    function toggleSelect(id, checked) { if(checked) selectedIds.add(id); else selectedIds.delete(id); }
    function deleteSelected() { if(!selectedIds.size) return; if(confirm(`Borrar ${selectedIds.size} entradas?`)){ let entries=getEntries().filter(e=>!selectedIds.has(e.id)); saveEntries(entries); selectedIds.clear(); } }
    
    function updateStats() {
        let e=getEntries();
        let byModel={eva:0,selene:0,nyx:0,aria:0};
        e.forEach(ee=>byModel[ee.model]=(byModel[ee.model]||0)+1);
        document.getElementById('statsPanel').innerHTML=`<div class="stat-card">📚 Total: ${e.length}</div><div class="stat-card">Eva:${byModel.eva} Selene:${byModel.selene} Nyx:${byModel.nyx} Aria:${byModel.aria}</div><div class="stat-card">⭐ Favoritos:${e.filter(f=>f.favorite).length}</div><div class="stat-card">🎯 Intenciones: ${[...new Set(e.map(ee=>ee.intent))].length}</div>`;
    }
    
    function exportAllFormats() { let data=getEntries(); let blobCSV=new Blob([["id,keywords,response,model,intent,priority"].join(",")+"\n"+data.map(d=>`${d.id},"${d.keywords.join('|')}","${d.response.replace(/"/g,'""')}",${d.model},${d.intent},${d.priority}`).join("\n")],{type:"text/csv"}); let a=document.createElement('a'); a.href=URL.createObjectURL(blobCSV); a.download="export.csv"; a.click(); showToast("CSV exportado"); }
    function importCSV() { alert("Sube un CSV con columnas: keywords, response, model, intent, priority"); }
    function createBackup() { let backup={entries:getEntries(), memory:conversationMemory, date:new Date()}; localStorage.setItem('auto_backup',JSON.stringify(backup)); showToast("Backup creado"); }
    function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light'); }
    function toggleView() { viewMode=viewMode==='list'?'cards':'list'; renderEntries(); }
    function showToast(msg) { let t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function escapeHtml(s){ return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // Demo data
    function loadFullDemo() {
        let demo = [
            { keywords:["hola","buenas","hey"], response:"¡Hola {nombre}! ¿Cómo va todo?", model:"eva", intent:"saludo", priority:9, requires:"", alternatives:"¡Hey {nombre}!|Qué pasa {nombre}|Hola {nombre}, encantado de verte" },
            { keywords:["triste","mal","deprimido"], response:"Lo siento mucho {nombre}. Cuéntame qué pasó, estoy aquí para ti.", model:"eva", intent:"consuelo", priority:10, requires:"", alternatives:"Ánimo {nombre}, las cosas mejoran.|Estoy contigo {nombre}, desahógate." },
            { keywords:["nombre es"], response:"¡Encantado {nombre}! Me alegra conocerte.", model:"eva", intent:"presentacion", priority:8, requires:"", alternatives:"" },
            { keywords:["gracias","te lo agradezco"], response:"De nada {nombre}, para eso estoy 😊", model:"eva", intent:"despedida", priority:7, requires:"", alternatives:"Un placer ayudarte.|Cuando quieras {nombre}." }
        ];
        let entries = getEntries();
        demo.forEach(d=>{ entries.push({ id:Date.now()+Math.random(), ...d, favorite:false, created:new Date().toISOString() }); });
        saveEntries(entries);
        showToast("Demo cargada - probá 'hola', 'estoy triste', 'mi nombre es Juan'");
    }
    
    if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark');
    window.onload = () => { renderEntries(); updateStats(); if(!getEntries().length) loadFullDemo(); addMessage("bot","🤖 Hola! Tengo memoria avanzada. Dime 'hola', 'estoy triste' o 'mi nombre es...' y verás cómo recuerdo todo."); };
</script>
</body>
</html>
