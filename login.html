<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eva IA - Acceder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        .bg-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }
        .bg-glow {
            position: fixed;
            width: 300px; height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }
        .bg-glow.g1 { background: #2563EB; top: -100px; left: -100px; }
        .bg-glow.g2 { background: #7C3AED; bottom: -100px; right: -100px; }
        .particles { position: fixed; inset: 0; z-index: 0; }
        .particle {
            position: absolute; width: 3px; height: 3px;
            background: rgba(37,99,235,0.5); border-radius: 50%;
            animation: floatUp 8s infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }
        .login-wrapper {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
        }
        .login-card {
            background: rgba(15,15,15,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px 28px 32px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.6);
        }
        .logo-area { text-align: center; margin-bottom: 32px; }
        .logo-sphere {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563EB, #7C3AED, #EC4899);
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            animation: pulse 3s ease-in-out infinite;
            box-shadow: 0 8px 32px rgba(37,99,235,0.3);
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .logo-sphere span { font-size: 26px; }
        .logo-name { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        .logo-desc { font-size: 12px; color: #888; margin-top: 4px; }
        .tabs {
            display: flex; gap: 0;
            background: #111; border-radius: 12px;
            padding: 4px; margin-bottom: 24px;
        }
        .tab {
            flex: 1; padding: 10px;
            border-radius: 10px; border: none;
            background: transparent; color: #888;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .tab.active { background: #1a1a1a; color: #fff; }
        .field { margin-bottom: 14px; }
        .field label {
            display: block; font-size: 10px; font-weight: 700;
            color: #888; margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .field input {
            width: 100%; padding: 14px 16px;
            background: #0a0a0a; border: 1px solid #1a1a1a;
            border-radius: 12px; font-size: 14px;
            color: #fff; outline: none; transition: all 0.2s;
        }
        .field input:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
        }
        .field input::placeholder { color: #444; }
        .pass-field { position: relative; }
        .pass-toggle {
            position: absolute; right: 14px; top: 38px;
            background: none; border: none; color: #666;
            cursor: pointer; font-size: 12px; font-weight: 600;
        }
        .terms-row {
            display: flex; align-items: flex-start; gap: 10px;
            margin-bottom: 20px;
        }
        .terms-row input[type="checkbox"] {
            width: 18px; height: 18px; accent-color: #2563EB;
            margin-top: 2px; flex-shrink: 0;
        }
        .terms-row label { font-size: 11px; color: #888; line-height: 1.5; }
        .terms-row a { color: #2563EB; text-decoration: none; font-weight: 600; }
        .btn {
            width: 100%; padding: 14px; border: none;
            border-radius: 12px; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-main {
            background: linear-gradient(135deg, #2563EB, #1D4ED8);
            color: #fff; margin-bottom: 12px;
        }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-google {
            background: #fff; color: #111;
            display: flex; align-items: center; justify-content: center;
            gap: 8px; font-weight: 600;
        }
        .sep {
            display: flex; align-items: center; gap: 12px;
            margin: 18px 0; color: #444; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .sep::before, .sep::after {
            content: ''; flex: 1; height: 1px; background: #1a1a1a;
        }
        .msg {
            border-radius: 10px; padding: 10px 14px;
            font-size: 11px; margin-bottom: 14px;
            text-align: center; display: none;
        }
        .msg-error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: #EF4444;
        }
        .msg-ok {
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            color: #10B981;
        }
        .footer-note {
            text-align: center; margin-top: 20px;
            font-size: 10px; color: #444; line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="particles" id="particles"></div>

<div class="login-wrapper">
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-sphere"><span>🧠</span></div>
            <div class="logo-name">Eva IA</div>
            <div class="logo-desc">Tu asistente personal inteligente</div>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabLogin" onclick="switchTab('login')">Iniciar Sesión</button>
            <button class="tab" id="tabRegister" onclick="switchTab('register')">Registrarse</button>
        </div>

        <div class="msg msg-error" id="errorMsg"></div>
        <div class="msg msg-ok" id="successMsg"></div>

        <div class="field">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
        </div>

        <div class="field pass-field">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres">
            <button class="pass-toggle" onclick="togglePass()" id="passToggle">Mostrar</button>
        </div>

        <div class="terms-row">
            <input type="checkbox" id="acceptTerms" onchange="updateBtn()">
            <label>Acepto los <a href="#" onclick="showModal('terms',event)">Términos</a> y la <a href="#" onclick="showModal('privacy',event)">Privacidad</a></label>
        </div>

        <button class="btn btn-main" onclick="handleAuth()" id="authBtn" disabled>Iniciar Sesión</button>

        <div class="sep">o</div>

        <button class="btn btn-google" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuar con Google
        </button>

        <p class="footer-note">
            Protegido por Firebase Authentication<br>
            Tus datos están seguros y encriptados
        </p>
    </div>
</div>

<!-- Modal Términos -->
<div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;padding:20px;" onclick="closeModal()">
    <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:32px 24px;max-width:400px;width:100%;text-align:left;color:#fff;" onclick="event.stopPropagation()">
        <h3 style="font-size:18px;margin-bottom:12px;color:#fff;" id="modalTitle"></h3>
        <p style="font-size:13px;color:#aaa;line-height:1.7;white-space:pre-line;" id="modalBody"></p>
        <button onclick="closeModal()" style="width:100%;margin-top:20px;padding:12px;background:#2563EB;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;">Entendido</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// Firebase
firebase.initializeApp({
    apiKey: "AIzaSyBiUKBNFkMcW2-5AMPZPxrmtqXzu4rS9ZM",
    authDomain: "gen-lang-client-0059662230.firebaseapp.com",
    projectId: "gen-lang-client-0059662230",
    storageBucket: "gen-lang-client-0059662230.firebasestorage.app",
    messagingSenderId: "146794930401",
    appId: "1:146794930401:web:8eb012b2c3302b8381d7a0"
});
const auth = firebase.auth();

// Partículas
for(var i=0;i<40;i++){
    var p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDelay=Math.random()*8+'s';
    p.style.animationDuration=(4+Math.random()*8)+'s';
    document.getElementById('particles').appendChild(p);
}

var mode='login';

function switchTab(t){
    mode=t;
    document.getElementById('tabLogin').className='tab'+(t==='login'?' active':'');
    document.getElementById('tabRegister').className='tab'+(t==='register'?' active':'');
    document.getElementById('authBtn').textContent=t==='login'?'Iniciar Sesión':'Crear Cuenta';
    hideMsg();
}

function updateBtn(){
    var b=document.getElementById('authBtn');
    var c=document.getElementById('acceptTerms').checked;
    b.disabled=!c;
}

function togglePass(){
    var p=document.getElementById('password');
    var b=document.getElementById('passToggle');
    if(p.type==='password'){p.type='text';b.textContent='Ocultar';}
    else{p.type='password';b.textContent='Mostrar';}
}

function hideMsg(){
    document.getElementById('errorMsg').style.display='none';
    document.getElementById('successMsg').style.display='none';
}

function showErr(m){
    var e=document.getElementById('errorMsg');
    e.textContent=m;e.style.display='block';
    document.getElementById('successMsg').style.display='none';
}

function showOk(m){
    var e=document.getElementById('successMsg');
    e.textContent=m;e.style.display='block';
    document.getElementById('errorMsg').style.display='none';
}

var termsText={
    terms:"TÉRMINOS Y CONDICIONES\n\n1. Eva IA es un asistente gratuito.\n2. No compartimos tu información.\n3. Eva puede cometer errores.\n4. Debes ser mayor de 13 años.\n5. No nos hacemos responsables del uso indebido.",
    privacy:"POLÍTICA DE PRIVACIDAD\n\nTus datos se almacenan en Firebase.\nNo vendemos ni compartimos información.\nPuedes eliminar tu cuenta cuando quieras.\nUsamos encriptación de grado militar."
};

function showModal(t,e){
    e.preventDefault();
    document.getElementById('modalTitle').textContent=t==='terms'?'Términos y Condiciones':'Política de Privacidad';
    document.getElementById('modalBody').textContent=termsText[t];
    document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(){
    document.getElementById('modalOverlay').style.display='none';
}

function handleAuth(){
    hideMsg();
    if(!document.getElementById('acceptTerms').checked){showErr('Acepta los Términos');return;}
    var email=document.getElementById('email').value.trim();
    var pass=document.getElementById('password').value;
    if(!email){showErr('Ingresa tu correo');return;}
    if(pass.length<6){showErr('Mínimo 6 caracteres');return;}

    var btn=document.getElementById('authBtn');
    btn.disabled=true;btn.textContent='Procesando...';

    if(mode==='login'){
        auth.signInWithEmailAndPassword(email,pass)
        .then(function(){showOk('¡Bienvenido!');setTimeout(function(){window.location.href='index.html';},800);})
        .catch(function(e){
            btn.disabled=false;btn.textContent='Iniciar Sesión';updateBtn();
            showErr(e.code==='auth/user-not-found'?'No existe cuenta':e.code==='auth/wrong-password'?'Contraseña incorrecta':e.message);
        });
    }else{
        auth.createUserWithEmailAndPassword(email,pass)
        .then(function(){showOk('¡Cuenta creada!');setTimeout(function(){window.location.href='index.html';},800);})
        .catch(function(e){
            btn.disabled=false;btn.textContent='Crear Cuenta';updateBtn();
            showErr(e.code==='auth/email-already-in-use'?'Correo ya registrado':e.code==='auth/weak-password'?'Contraseña débil':e.message);
        });
    }
}

function loginWithGoogle(){
    if(!document.getElementById('acceptTerms').checked){showErr('Acepta los Términos');return;}
    var p=new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(p);
}

auth.getRedirectResult().then(function(r){if(r.user)window.location.href='index.html';}).catch(function(e){showErr(e.message);});
auth.onAuthStateChanged(function(u){if(u)window.location.href='index.html';});
</script>

</body>
</html>
