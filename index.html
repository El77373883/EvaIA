   /* ===== PORTAL CÓSMICO EVA ===== */
.eva-thinking {
    width: 44px;
    height: 44px;
    position: relative;
    flex-shrink: 0;
}

.eva-core {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #a78bfa, #7c3aed);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: coreBreathe 1.5s ease-in-out infinite;
    box-shadow: 0 0 12px rgba(124,58,237,0.9), 0 0 28px rgba(99,102,241,0.5);
    z-index: 3;
}

@keyframes coreBreathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.3); }
}

.eva-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1.5px solid transparent;
    z-index: 2;
}

.eva-ring:nth-child(1) {
    width: 30px;
    height: 30px;
    border-top-color: rgba(168,85,247,0.7);
    border-right-color: rgba(99,102,241,0.4);
    animation: ringSpin 2.5s linear infinite;
}

.eva-ring:nth-child(2) {
    width: 38px;
    height: 38px;
    border-bottom-color: rgba(139,92,246,0.5);
    border-left-color: rgba(99,102,241,0.3);
    animation: ringSpin 4s linear infinite reverse;
}

@keyframes ringSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

.eva-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #a78bfa;
    z-index: 1;
    animation: particleOrbit 2s ease-in-out infinite;
}

.eva-particle:nth-child(1) { top: 4px; left: 50%; animation-delay: 0s; }
.eva-particle:nth-child(2) { bottom: 4px; right: 8px; animation-delay: 0.3s; animation-duration: 2.5s; }
.eva-particle:nth-child(3) { bottom: 8px; left: 8px; animation-delay: 0.6s; animation-duration: 1.8s; }
.eva-particle:nth-child(4) { top: 6px; right: 8px; animation-delay: 0.9s; animation-duration: 2.2s; }

@keyframes particleOrbit {
    0%, 100% { opacity: 0.2; transform: translateY(0) scale(1); }
    50% { opacity: 1; transform: translateY(-8px) scale(2); }
}
        @keyframes particleFloat { 0%,100% { opacity: 0; transform: translateY(0) scale(0); } 50% { opacity: 1; transform: translateY(-10px) scale(1.5); } }
        .thinking-text { font-size: 12px; color: #999; font-style: italic; }
        .thinking-bubble::after { content: '👆 Toca para ver proceso'; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #999; white-space: nowrap; opacity: 0; }
.thinking-bubble:hover::after { opacity: 1; }
.thinking-bubble { background: #F0F0F0; border-radius: 18px; border-bottom-left-radius: 4px; padding: 10px 14px; display: flex; align-items: center; gap: 6px; cursor: pointer; position: relative; }
.thinking-bubble:active { transform: scale(0.97); }
.thinking-bubble::after { content: '👆 Ver proceso'; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #999; white-space: nowrap; opacity: 0; transition: opacity 0.3s; }
.thinking-bubble:hover::after { opacity: 1; }


.thinking-bubble:active { transform: scale(0.97); }
        .thinking-dot { width: 6px; height: 6px; background: #999; border-radius: 50%; animation: dotPulse 1.4s infinite; }

        @keyframes dotPulse { 0%,60%,100% { opacity: 0.3; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1.3); } }

        .clear-all-btn:active { background: #fee2e2; color: #EF4444; }
        .empty-chats { text-align: center; color: #bbb; padding: 40px 20px; font-size: 13px; }

@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== EXPORT SHEET ===== */
.export-sheet{position:fixed;bottom:0;left:0;right:0;background:#F2F2F7;border-radius:22px 22px 0 0;z-index:9999;padding:0 0 36px;animation:thinkSlideUp 0.3s cubic-bezier(0.32,0.72,0,1)}
.export-handle{width:36px;height:5px;background:rgba(60,60,67,0.28);border-radius:3px;margin:10px auto 16px}
.export-title{font-size:17px;font-weight:600;text-align:center;color:#000;margin-bottom:16px}
.export-opts{background:#fff;border-radius:14px;margin:0 16px;overflow:hidden}
.export-opt{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.15s}
.export-opt:not(:last-child){border-bottom:1px solid rgba(60,60,67,0.1)}
.export-opt:active{background:#F2F2F7}
.export-opt-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.export-opt-ico svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.export-opt-info{flex:1}
.export-opt-title{font-size:15px;font-weight:500;color:#000}
.export-opt-sub{font-size:12px;color:#8E8E93;margin-top:1px}
.export-cancel{display:block;width:calc(100% - 32px);margin:12px 16px 0;padding:14px;background:#fff;border:none;border-radius:14px;color:#007AFF;font-size:17px;cursor:pointer;font-family:inherit}
.export-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:9998}

/* ===== FILE ATTACH SHEET ===== */
.attach-sheet{position:fixed;bottom:0;left:0;right:0;background:#F2F2F7;border-radius:22px 22px 0 0;z-index:9999;padding:0 0 36px;animation:thinkSlideUp 0.3s cubic-bezier(0.32,0.72,0,1)}
.attach-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px}
.attach-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.attach-item:active .attach-ico{transform:scale(0.93)}
.attach-ico{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:transform 0.15s}
.attach-ico svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.attach-label{font-size:11px;color:#3C3C43;font-weight:500;text-align:center}
.attach-preview{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px 0;min-height:0;max-height:120px;overflow-y:auto}

/* ===== THINKING INDICATOR PREMIUM v2.0 ===== */
.think-bub {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 22px;
    border-bottom-left-radius: 6px;
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    min-width: 240px;
    max-width: 320px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.35s ease;
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

.think-bub::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 36%, rgba(255,255,255,0.3) 38%, rgba(255,255,255,0.5) 40%, rgba(255,255,255,0.3) 42%, transparent 44%);
    transform: translateX(-100%);
    animation: shimmerSweep 3.2s ease-in-out infinite;
    z-index: 1;
    pointer-events: none;
}

@keyframes shimmerSweep {
    0%, 100% { transform: translateX(-100%); }
    65% { transform: translateX(250%); }
}

.think-bub-eq {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 32px;
    flex-shrink: 0;
    z-index: 2;
    padding-top: 4px;
}

.think-bub-eq-bar {
    width: 4px;
    border-radius: 2px;
    background: linear-gradient(180deg, #7c3aed, #a78bfa);
    animation: eqPulse 1.2s ease-in-out infinite;
}

.think-bub-eq-bar:nth-child(1) { height: 12px; animation-delay: 0s; }
.think-bub-eq-bar:nth-child(2) { height: 22px; animation-delay: 0.15s; }
.think-bub-eq-bar:nth-child(3) { height: 16px; animation-delay: 0.3s; }
.think-bub-eq-bar:nth-child(4) { height: 28px; animation-delay: 0.45s; }
.think-bub-eq-bar:nth-child(5) { height: 10px; animation-delay: 0.6s; }

@keyframes eqPulse {
    0%, 100% { transform: scaleY(0.5); opacity: 0.4; }
    50% { transform: scaleY(1.15); opacity: 1; }
}

.think-bub-content {
    flex: 1;
    min-width: 0;
    z-index: 2;
}

.think-bub-text {
    font-size: 11px;
    font-weight: 600;
    color: #7c3aed;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    animation: textGlow 2.8s ease-in-out infinite;
}

@keyframes textGlow {
    0%, 100% { opacity: 0.65; text-shadow: 0 0 0px rgba(124, 58, 237, 0); }
    50% { opacity: 1; text-shadow: 0 0 10px rgba(124, 58, 237, 0.35); }
}

.think-bub-skeleton {
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, rgba(124, 58, 237, 0.1) 0%, rgba(124, 58, 237, 0.25) 50%, rgba(124, 58, 237, 0.1) 100%);
    background-size: 200% 100%;
    animation: skeletonShimmer 2.2s ease-in-out infinite;
    margin-bottom: 7px;
}

.think-bub-skeleton:nth-child(2) { width: 82%; }
.think-bub-skeleton:nth-child(3) { width: 62%; }
.think-bub-skeleton:nth-child(4) { width: 44%; }

@keyframes skeletonShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.think-bub-dots {
    display: flex;
    gap: 3px;
    margin-top: 5px;
}

.think-bub-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(124, 58, 237, 0.4);
    animation: dotFade 1.4s ease-in-out infinite;
}

.think-bub-dot:nth-child(2) { animation-delay: 0.2s; }
.think-bub-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotFade {
    0%, 60%, 100% { opacity: 0.2; transform: scale(0.6); }
    30% { opacity: 1; transform: scale(1.25); }
}

/* ===== PORTAL CÓSMICO EVA ===== */
.eva-thinking {
    width: 44px; height: 44px; position: relative; flex-shrink: 0;
}
.eva-core {
    width: 20px; height: 20px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #a78bfa, #7c3aed);
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    animation: coreBreathe 1.5s ease-in-out infinite;
    box-shadow: 0 0 12px rgba(124,58,237,0.9), 0 0 28px rgba(99,102,241,0.5);
    z-index: 3;
}
@keyframes coreBreathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.3); }
}
.eva-ring {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    border-radius: 50%; border: 1.5px solid transparent; z-index: 2;
}
.eva-ring:nth-child(1) {
    width: 30px; height: 30px;
    border-top-color: rgba(168,85,247,0.7); border-right-color: rgba(99,102,241,0.4);
    animation: ringSpin 2.5s linear infinite;
}
.eva-ring:nth-child(2) {
    width: 38px; height: 38px;
    border-bottom-color: rgba(139,92,246,0.5); border-left-color: rgba(99,102,241,0.3);
    animation: ringSpin 4s linear infinite reverse;
}
@keyframes ringSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}
.eva-particle {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    background: #a78bfa; z-index: 1;
    animation: particleOrbit 2s ease-in-out infinite;
}
.eva-particle:nth-child(1) { top: 4px; left: 50%; animation-delay: 0s; }
.eva-particle:nth-child(2) { bottom: 4px; right: 8px; animation-delay: 0.3s; animation-duration: 2.5s; }
.eva-particle:nth-child(3) { bottom: 8px; left: 8px; animation-delay: 0.6s; animation-duration: 1.8s; }
.eva-particle:nth-child(4) { top: 6px; right: 8px; animation-delay: 0.9s; animation-duration: 2.2s; }
@keyframes particleOrbit {
    0%, 100% { opacity: 0.2; transform: translateY(0) scale(1); }
    50% { opacity: 1; transform: translateY(-8px) scale(2); }
}

@keyframes dotPulsePro {

}

function getFlowResponse(flow, stepIndex) {
    var step = flow.steps[stepIndex];

    var responses = step.responses;
    if (!responses || responses.length === 0) return null;
    var key = flow.keyword + '_' + stepIndex;

    if (flow.mode === 'order') {
        var current = flowResponseIndexes[key] !== undefined ? flowResponseIndexes[key] : -1;
        var next = (current + 1) % responses.length;
        flowResponseIndexes[key] = next;
        return responses[next];
    } else {
        var last = flowResponseIndexes[key] !== undefined ? flowResponseIndexes[key] : -1;
        var idx;
        if (responses.length === 1) {
            idx = 0;
        } else {
            do { idx = Math.floor(Math.random() * responses.length); } while (idx === last);
        }
        flowResponseIndexes[key] = idx;
        return responses[idx];
    }
}

function loadFromAdmin() {
    try {
        var entries = JSON.parse(localStorage.getItem('eva_entries') || '[]');
        
        entries.forEach(function(entry, idx) {
            var catName = 'custom_entry_' + idx;
            
            knowledge.push({
                category: catName,
                keywords: entry.keywords
            });

            // GRUPO: múltiples respuestas
            if (entry.isGroup && Array.isArray(entry.responses)) {
                entry.responses.forEach(function(r) {
                    if (!r || !r.trim()) return;
                    responses.push({
                        category: catName,
                        model: entry.model || 'eva',
                        text: r.trim()
                    });
                });
            }
            // ÚNICA: una sola respuesta
            else if (entry.response) {
                var responseText = entry.response;
                if (!responseText.includes('```')) {
                    if (responseText.includes('<!DOCTYPE') || responseText.includes('<html')) {
                        responseText = '```html\n' + responseText + '\n```';
                    } else if (responseText.includes('function') || responseText.includes('const ') || responseText.includes('let ') || responseText.includes('var ')) {
                        responseText = '```javascript\n' + responseText + '\n```';
                    } else if (responseText.includes('def ') || responseText.includes('import ') || responseText.includes('print(')) {
                        responseText = '```python\n' + responseText + '\n```';
                    } else if (responseText.includes('{') && responseText.includes(':') && responseText.includes(';')) {
                        responseText = '```css\n' + responseText + '\n```';
                    }
                }
                responses.push({
                    category: catName,
                    model: entry.model || 'eva',
                    text: responseText
                });
            }
        });
        
        console.log('✅ Entradas cargadas: ' + entries.length);
    } catch(e) {
        console.log('❌ Error:', e);
    }
}

// Detectar el contexto de la conversación
function detectContext(input) {
    var msg = input.toLowerCase();
    var scores = {};
    
    for (var context in knowledgeBase) {
        scores[context] = 0;
        knowledgeBase[context].keywords.forEach(function(kw) {
            if (msg.includes(kw)) scores[context]++;
        });
    }
    
    var bestContext = 'general';
    var bestScore = 0;
    for (var c in scores) {
        if (scores[c] > bestScore) {
            bestScore = scores[c];
            bestContext = c;
        }
    }
    
    return { context: bestContext, score: bestScore };
}


// Respuesta inteligente según contexto
function getIntelligentResponse(input, context) {
    var msg = input.toLowerCase();
    
    // Detectar seguimiento de conversación
    if (shortTermMemory.length > 0) {
        var lastMsg = shortTermMemory[shortTermMemory.length - 1];
        var lastContext = detectContext(lastMsg.user).context;
        
        // Si el mensaje es muy corto y hay contexto previo, continuarlo
        if (msg.split(' ').length <= 3 && lastContext !== 'general' && context === 'general') {
            context = lastContext;

function corregirTexto(texto) {
    var palabras = texto.toLowerCase().split(' ');
    var corregido = [];
    
    for (var i = 0; i < palabras.length; i++) {
        var palabra = palabras[i];
        // Buscar frases de 2-3 palabras primero
        var frase2 = palabras[i] + ' ' + (palabras[i+1] || '');
        var frase3 = frase2 + ' ' + (palabras[i+2] || '');
        
        if (correcciones[frase3]) {
            corregido.push(correcciones[frase3]);
            i += 2;
        } else if (correcciones[frase2]) {
            corregido.push(correcciones[frase2]);
            i += 1;
        } else if (correcciones[palabra]) {
            corregido.push(correcciones[palabra]);
        } else {
            corregido.push(palabra);
        }
    }
    
    return corregido.join(' ');
}

function speakText(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        var cleanText = text.replace(/\*\*/g, '').replace(/```[\s\S]*?```/g, ' [código omitido] ').replace(/!\[.*?\]\(.*?\)/g, '').replace(/[#*_~`>|-]/g, '').trim();
        var utterance = new SpeechSynthesisUtterance(cleanText.slice(0, 500));
        utterance.lang = 'es-MX';
        utterance.rate = 1.0;
        utterance.pitch = 1.1;
        var voices = speechSynthesis.getVoices();
        var spanishVoice = voices.find(function(v) { return v.lang.startsWith('es'); });
        if (spanishVoice) utterance.voice = spanishVoice;
        window.speechSynthesis.speak(utterance);
    }
}

// ============ ANÁLISIS DE SENTIMIENTO ============
function analyzeSentiment(text) {
    var msg = text.toLowerCase();
    
    var positiveWords = ['gracias', 'genial', 'excelente', 'bueno', 'feliz', 'amor', 'increíble', 'perfecto', 'bien', 'gusta', 'hermoso', 'divertido', 'genio', 'crack', 'uff', 'jaja', 'jeje', ':D', ':)', '❤️', '💪'];
    var negativeWords = ['mal', 'triste', 'enojado', 'furioso', 'odio', 'horrible', 'terrible', 'estresado', 'cansado', 'harto', 'decepcion', 'miedo', 'ansiedad', ':(', ':/'];
    var questionWords = ['?', 'por qué', 'como', 'cuando', 'donde', 'quien', 'que es', 'cual', 'puedes', 'podrias', 'explica', 'dime'];
    
    var positiveScore = 0;
    var negativeScore = 0;
    var questionScore = 0;
    
    positiveWords.forEach(function(w) { if (msg.includes(w)) positiveScore++; });
    negativeWords.forEach(function(w) { if (msg.includes(w)) negativeScore++; });
    questionWords.forEach(function(w) { if (msg.includes(w)) questionScore++; });
    
    if (positiveScore > negativeScore && positiveScore > questionScore) return 'positivo';
    if (negativeScore > positiveScore && negativeScore > questionScore) return 'negativo';
    if (questionScore > 0) return 'curioso';
    return 'neutral';
}

// ============ RECOPILAR INFORMACIÓN NUEVA ============
function learnFromUserInput(input) {
    var msg = input.toLowerCase();
    
    // Detectar nombre del usuario
    var namePatterns = [
        /me llamo (\w+)/i,
        /soy (\w+)/i,
        /mi nombre es (\w+)/i,
        /puedes llamarme (\w+)/i
    ];
    
    namePatterns.forEach(function(pattern) {
        var match = msg.match(pattern);
        if (match && !longTermMemory.userName) {
            longTermMemory.userName = match[1];
            longTermMemory.userFacts.push('Nombre: ' + match[1]);
        }
    });
    
    // Detectar temas de interés
    var interestPatterns = [
        /me gusta (\w+)/gi,
        /me interesa (\w+)/gi,
        /estudio (\w+)/gi,
        /trabajo en (\w+)/gi,
        /soy (programador|doctor|estudiante|ingeniero|diseñador|artista|músico|profesor)/gi
    ];
    
    interestPatterns.forEach(function(pattern) {
        var matches = msg.match(pattern);
        if (matches) {
            matches.forEach(function(m) {
                var topic = m.replace(/me gusta |me interesa |estudio |trabajo en |soy /gi, '').trim();
                if (topic && longTermMemory.userTopics.indexOf(topic) === -1) {
                    longTermMemory.userTopics.push(topic);
                }
            });
        }
    });
    
    // Aprender datos nuevos (patrón: "X es Y" o "X significa Y")
    var factPatterns = [
        /(\w+) es ([\w\s]+)/gi,
        /(\w+) significa ([\w\s]+)/gi,
        /sabias que ([\w\s]+)/gi
    ];
    
    factPatterns.forEach(function(pattern) {
        var matches = msg.match(pattern);
        if (matches) {
            matches.forEach(function(m) {
                if (longTermMemory.learnedInfo.length < 50 && longTermMemory.learnedInfo.indexOf(m) === -1) {
                    longTermMemory.learnedInfo.push(m);
                }
            });
        }
    });
    
    longTermMemory.conversationCount++;
    saveLongTermMemory();
}

// ============ BUSCAR EN MEMORIA ============
function searchMemory(query) {
    var msg = query.toLowerCase();
    var results = [];
    
    // Buscar en memoria a corto plazo
    shortTermMemory.forEach(function(item) {
        if (item.user.toLowerCase().includes(msg) || item.eva.toLowerCase().includes(msg)) {
            results.push({ type: 'reciente', content: 'Hablamos de: "' + item.user + '"' });
        }
    });
    
    // Buscar en datos del usuario
    longTermMemory.userFacts.forEach(function(fact) {
        if (fact.toLowerCase().includes(msg)) {
            results.push({ type: 'usuario', content: 'Sé que ' + fact });
        }
    });
    
    // Buscar en información aprendida
    longTermMemory.learnedInfo.forEach(function(info) {
        if (info.toLowerCase().includes(msg)) {
            results.push({ type: 'aprendido', content: 'Aprendí: ' + info });
        }
    });
    
    return results.slice(0, 3); // máximo 3 resultados
}

// ============ ANÁLISIS DE CÓDIGO ============
function analyzeCodeIntelligently(code, lang) {
    var issues = [];
    var suggestions = [];
    var description = '';
    var format = lang || '';
    
    // Detectar formato si no viene
    if (!format) {
        if (code.includes('<!DOCTYPE') || code.includes('<html')) format = 'HTML';
        else if (code.includes('function') || code.includes('const ') || code.includes('let ')) format = 'JavaScript';
        else if (code.includes('def ') || code.includes('import ')) format = 'Python';
        else if (code.includes('{') && code.includes(':') && code.includes(';')) format = 'CSS';
        else format = 'desconocido';
    }
    
    // HTML
    if (format === 'html' || format === 'HTML') {
        if (code.includes('<html') && code.includes('<body')) description = 'una página HTML completa';
        else if (code.includes('<h1') || code.includes('<p')) description = 'elementos HTML sueltos';
        else description = 'código HTML';
        
        if (!code.includes('<!DOCTYPE')) issues.push('❌ Falta DOCTYPE');
        if (!code.includes('<meta charset=')) issues.push('⚠️ Falta meta charset');
        if (!code.includes('<meta name="viewport"')) issues.push('⚠️ Falta viewport para responsive');
        if (!code.includes('<title>')) suggestions.push('💡 Agrega <title> para la pestaña');
        if (!code.includes('</html>')) issues.push('❌ Falta </html>');
        if (!code.includes('</body>')) issues.push('❌ Falta </body>');
        if (!code.includes('lang=')) suggestions.push('💡 Agrega lang="es" al HTML');
        if (!code.includes('<link') && !code.includes('<style')) suggestions.push('💡 Agrega CSS para darle estilo');
        if (code.includes('<img') && !code.includes('alt=')) suggestions.push('💡 Agrega alt a las imágenes');
    }
    
    // JavaScript
    if (format === 'javascript' || format === 'JavaScript') {
        if (code.includes('function') && code.includes('return')) description = 'una función con retorno';
        else if (code.includes('function')) description = 'una función JavaScript';
        else description = 'código JavaScript';
        
        var oB = (code.match(/\{/g) || []).length;
        var cB = (code.match(/\}/g) || []).length;
        if (oB !== cB) issues.push('❌ Llaves: ' + oB + ' vs ' + cB);
        
        var pO = (code.match(/\(/g) || []).length;
        var pC = (code.match(/\)/g) || []).length;
        if (pO !== pC) issues.push('❌ Paréntesis desbalanceados');
        
        if (code.includes('var ')) suggestions.push('💡 Usa let o const en vez de var');
        if (code.includes('==') && !code.includes('===')) suggestions.push('💡 Usa === para comparación estricta');
        if (code.includes('function') && !code.includes('return') && !code.includes('console.log')) suggestions.push('💡 La función no retorna ni muestra nada');
    }
    
    // Python
    if (format === 'python' || format === 'Python') {
        description = code.includes('def ') ? 'una función Python' : 'código Python';
        if (code.includes('print ') && !code.includes('(')) issues.push('❌ print necesita paréntesis');
        if (code.includes('def ') && !code.includes('return') && !code.includes('print')) suggestions.push('💡 La función no retorna ni imprime');
    }
    
    // CSS
    if (format === 'css' || format === 'CSS') {
        description = 'estilos CSS';
        var oC = (code.match(/\{/g) || []).length;
        var cC = (code.match(/\}/g) || []).length;
        if (oC !== cC) issues.push('❌ Llaves CSS: ' + oC + ' vs ' + cC);
        if (!code.includes('box-sizing')) suggestions.push('💡 Agrega box-sizing: border-box');
    }
    
    return { format: format, description: description, issues: issues, suggestions: suggestions };
}

                if (textExts.includes(ext)) {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var content = e.target.result;
                        // Limitar a 12000 chars para no sobrepasar tokens
                        if (content.length > 12000) content = content.substring(0, 12000) + '\n... [archivo truncado]';
                        resolve({ name: file.name, ext: ext, type: 'text', content: content, file: file });
                    };
                    reader.onerror = function() { resolve({ name: file.name, ext: ext, type: 'error', file: file }); };
                    reader.readAsText(file);

                    // PDF: extraer texto con FileReader + aviso

                    reader.onload = function(e) {
                        // Intentar extraer texto básico del PDF
                        var bytes = new Uint8Array(e.target.result);
                        var str = '';
                        for (var i = 0; i < Math.min(bytes.length, 50000); i++) {
                            if (bytes[i] >= 32 && bytes[i] < 127) str += String.fromCharCode(bytes[i]);
                        }
                        var cleanText = str.replace(/[^\x20-\x7E\n]/g, ' ').replace(/\s{3,}/g, '\n').substring(0, 8000);
                        resolve({ name: file.name, ext: ext, type: 'pdf', content: cleanText, file: file });

function getSuggestions(msg, resp) {
    var m = msg.toLowerCase();
    var r = resp.toLowerCase();
    if (r.includes('```html') || r.includes('página') || r.includes('html')) return ['Agrega más estilos', 'Hazlo responsivo', 'Agregar animaciones'];
    if (r.includes('```css')) return ['Agrega modo oscuro', 'Mejora los colores', 'Agrega animaciones'];
    if (r.includes('```js') || r.includes('función') || r.includes('function')) return ['Explica el código', 'Agrega comentarios', 'Optimízalo'];
    if (r.includes('```py') || r.includes('python')) return ['Agrega manejo de errores', 'Explícame el código', 'Hazlo más eficiente'];
    if (m.includes('hola') || m.includes('buenas') || m.length < 10) return ['¿Qué puedes hacer?', 'Hazme una página web', 'Cuéntame algo interesante'];
    return [];
}

function detectPageType(msg) {
    var lower = msg.toLowerCase();
    if (lower.includes('landing') || lower.includes('inicio') || lower.includes('presentacion')) return 'landing';
    if (lower.includes('login') || lower.includes('iniciar sesion') || lower.includes('acceso')) return 'login';
    if (lower.includes('portfolio') || lower.includes('portafolio')) return 'portfolio';
    if (lower.includes('calculadora') || lower.includes('calcular')) return 'calculadora';
    if (lower.includes('formulario') || lower.includes('contacto')) return 'formulario';
if (lower.includes('dashboard') || lower.includes('panel')) return 'dashboard';
    if (lower.includes('tienda') || lower.includes('ecommerce') || lower.includes('shop') || lower.includes('comprar')) return 'tienda';
    if (lower.includes('blog') || lower.includes('articulos') || lower.includes('noticias')) return 'blog';
    if (lower.includes('coming soon') || lower.includes('proximamente') || lower.includes('en construccion') || lower.includes('cuenta regresiva')) return 'comingsoon';
    if (lower.includes('todo') || lower.includes('lista de tareas') || lower.includes('pendientes') || lower.includes('checklist')) return 'todo';
    return null;
}

            var num = parseInt(msg) - 1;
            if (num >= 0 && num < opts.length) type = opts[num];

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

<body>

    <div class="grid">
      <button class="btn-clear" onclick="clearCalc()">AC</button>
      <button class="btn-op" onclick="appendOp('%')">%</button>
      <button class="btn-op" onclick="appendOp('**')">^</button>
      <button class="btn-op" onclick="appendOp('/')">÷</button>
      <button class="btn-num" onclick="appendNum('7')">7</button>
      <button class="btn-num" onclick="appendNum('8')">8</button>
      <button class="btn-num" onclick="appendNum('9')">9</button>
      <button class="btn-op" onclick="appendOp('*')">×</button>
      <button class="btn-num" onclick="appendNum('4')">4</button>
      <button class="btn-num" onclick="appendNum('5')">5</button>
      <button class="btn-num" onclick="appendNum('6')">6</button>
      <button class="btn-op" onclick="appendOp('-')">−</button>
      <button class="btn-num" onclick="appendNum('1')">1</button>
      <button class="btn-num" onclick="appendNum('2')">2</button>
      <button class="btn-num" onclick="appendNum('3')">3</button>
      <button class="btn-op" onclick="appendOp('+')">+</button>
      <button class="btn-num btn-zero" onclick="appendNum('0')">0</button>
      <button class="btn-num" onclick="appendNum('.')">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>
  <script>
    var expr = '';
    function appendNum(n) { expr += n; document.getElementById('result').textContent = expr; }
    function appendOp(op) { if(expr) { expr += op; document.getElementById('expr').textContent = expr; document.getElementById('result').textContent = expr; } }
    function clearCalc() { expr = ''; document.getElementById('result').textContent = '0'; document.getElementById('expr').textContent = ''; }
    function calculate() {
      try {
        var r = Function('"use strict";return(' + expr + ')')();
        document.getElementById('expr').textContent = expr + ' =';
        document.getElementById('result').textContent = parseFloat(r.toFixed(10));
        expr = String(r);
      } catch(e) { document.getElementById('result').textContent = 'Error'; expr = ''; }
    }
  <\/script>
</body>

function shadeColor(color, percent) {
    var num = parseInt(color.replace('#',''), 16);
    var amt = Math.round(2.55 * percent);
    var R = Math.min(255, Math.max(0, (num >> 16) + amt));
    var G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
    var B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
    return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
}

async function searchDuckDuckGo(query) {
    try {
        var cleanQuery = query
            .replace(/que es /gi, '')
            .replace(/quien es /gi, '')
            .replace(/que son /gi, '')
            .replace(/\?/g, '')
            .trim();
        if (cleanQuery.length < 3) return null;
        var resp = await fetch('/api/search?q=' + encodeURIComponent(cleanQuery));
        var data = await resp.json();
        if (data.answer && data.answer.length > 10) {
            return '🔍 ' + data.answer;
        }
    } catch(e) {}
    return null;
}

async function askDuck(message) {
    try {
        var cleanQuery = message
            .replace(/busca en internet /gi, '')
            .replace(/busca /gi, '')
            .replace(/que es /gi, '')
            .replace(/quien es /gi, '')
            .replace(/que son /gi, '')
            .replace(/\?/g, '')
            .trim();
        
        if (cleanQuery.length < 2) return 'Escribe una pregunta más específica. 🦆';
        
        // Intentar API JSON de DuckDuckGo
        var url = 'https://api.duckduckgo.com/?q=' + encodeURIComponent(cleanQuery) + '&format=json&no_html=1&skip_disambig=1';
        
        var resp = await fetch(url, {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
        });
        
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        
        var data = await resp.json();
        var answer = '';
        
        // Buscar en todos los campos posibles
        if (data.Abstract && data.Abstract.length > 10) {
            answer = '📚 ' + data.Abstract;
            if (data.AbstractURL) answer += '\n\n🔗 ' + data.AbstractURL;
        } else if (data.AbstractText && data.AbstractText.length > 10) {
            answer = '📚 ' + data.AbstractText;
            if (data.AbstractURL) answer += '\n\n🔗 ' + data.AbstractURL;
        } else if (data.Answer && data.Answer.length > 2) {
            answer = '💡 ' + data.Answer;
        } else if (data.Definition && data.Definition.length > 2) {
            answer = '📝 ' + data.Definition;
            if (data.DefinitionSource) answer += '\n\n🔗 ' + data.DefinitionSource;
        } else if (data.Heading && data.Heading.length > 2) {
            answer = '📌 ' + data.Heading;
        } else if (data.RelatedTopics && data.RelatedTopics.length > 0) {
            answer = '🔍 Resultados:\n';
            var count = 0;
            for (var i = 0; i < data.RelatedTopics.length && count < 5; i++) {
                var t = data.RelatedTopics[i];
                if (t.Text && t.Text.length > 5) {
                    count++;
                    answer += '\n• ' + t.Text.split(' - ')[0].trim();
                    if (t.FirstURL) answer += '\n  🔗 ' + t.FirstURL;
                }
            }
        } else {
            // Si no hay nada, sugerir búsqueda en Google
            answer = 'No encontré resultados para "' + cleanQuery + '".\n\n🔍 Puedes buscar en Google: https://www.google.com/search?q=' + encodeURIComponent(cleanQuery);
        }
        
        return answer || 'No encontré resultados. Intenta con otras palabras. 🦆';
        
    } catch(e) {
        console.log('Error DuckDuckGo:', e.message);
        
        // Si falla la API, dar opción de buscar en Google
        var fallbackQuery = message.replace(/\?/g, '').trim();
return 'No pude conectar con DuckDuckGo. 🦆\n\n🔍 Busca en Google: https://www.google.com/search?q=' + encodeURIComponent(fallbackQuery);
    }
}

var searchMatches = [];
var searchIdx = 0;
function openSearch() {
    var bar = document.getElementById('searchBar');
    if (bar) { bar.style.display = 'flex'; setTimeout(function(){ document.getElementById('searchInput').focus(); }, 100); }
}
function closeSearch() {
    clearSearchHighlights();
    var bar = document.getElementById('searchBar');
    if (bar) bar.style.display = 'none';
    document.getElementById('searchInput').value = '';
    document.getElementById('searchCount').textContent = '';
    searchMatches = [];
}
function doSearch(q) {
    clearSearchHighlights();
    searchMatches = [];
    searchIdx = 0;
    if (!q.trim()) { document.getElementById('searchCount').textContent = ''; return; }
    var chatArea = document.getElementById('chatArea');
    var walker = document.createTreeWalker(chatArea, NodeFilter.SHOW_TEXT);
    var re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    var nodes = [];
    var node;
    while (node = walker.nextNode()) {
        if (node.parentElement.classList.contains('search-highlight')) continue;
        if (re.test(node.nodeValue)) nodes.push(node);
    }
    nodes.forEach(function(n) {
        var frag = document.createDocumentFragment();
        var parts = n.nodeValue.split(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'));
        parts.forEach(function(p) {
            if (p.toLowerCase() === q.toLowerCase()) {
                var span = document.createElement('span');
                span.className = 'search-highlight';
                span.textContent = p;
                searchMatches.push(span);
                frag.appendChild(span);
            } else {
                frag.appendChild(document.createTextNode(p));
            }
        });
        n.parentNode.replaceChild(frag, n);
    });
    document.getElementById('searchCount').textContent = searchMatches.length ? (1 + '/' + searchMatches.length) : 'Sin resultados';
    if (searchMatches.length) { searchMatches[0].classList.add('active'); searchMatches[0].scrollIntoView({block:'center'}); }
}
function nextSearchMatch() {
    if (!searchMatches.length) return;
    searchMatches[searchIdx].classList.remove('active');
    searchIdx = (searchIdx + 1) % searchMatches.length;
    searchMatches[searchIdx].classList.add('active');
    searchMatches[searchIdx].scrollIntoView({block:'center'});
    document.getElementById('searchCount').textContent = (searchIdx + 1) + '/' + searchMatches.length;
}
function prevSearchMatch() {
    if (!searchMatches.length) return;
    searchMatches[searchIdx].classList.remove('active');
    searchIdx = (searchIdx - 1 + searchMatches.length) % searchMatches.length;
    searchMatches[searchIdx].classList.add('active');
    searchMatches[searchIdx].scrollIntoView({block:'center'});
    document.getElementById('searchCount').textContent = (searchIdx + 1) + '/' + searchMatches.length;
}
function clearSearchHighlights() {
    document.querySelectorAll('.search-highlight').forEach(function(el) {
        el.replaceWith(document.createTextNode(el.textContent));
    });
}

// Swipe right to quote on messages
document.addEventListener('DOMContentLoaded', function() {
    var chatArea = document.getElementById('chatArea');
    if (!chatArea) return;
    var swipeStartX = 0, swipeStartY = 0, swipeEl = null;
    chatArea.addEventListener('touchstart', function(e) {
        swipeStartX = e.touches[0].clientX;
        swipeStartY = e.touches[0].clientY;
        swipeEl = e.target.closest('.message-bubble, .msg-text');
    }, {passive:true});
    chatArea.addEventListener('touchend', function(e) {
        if (!swipeEl) return;
        var dx = e.changedTouches[0].clientX - swipeStartX;
        var dy = Math.abs(e.changedTouches[0].clientY - swipeStartY);
        if (dx > 60 && dy < 40) {
            var text = swipeEl.textContent.trim();
            if (text) {
                quoteMessage(text);
                if (navigator.vibrate) navigator.vibrate(30);
                swipeEl.style.transition = 'transform 0.15s';
                swipeEl.style.transform = 'translateX(12px)';
                setTimeout(function(){ swipeEl.style.transform = ''; }, 300);
            }
        }
        swipeEl = null;
    }, {passive:true});
});

    closeExportSheet();
    var ca = document.getElementById('chatArea');
    if (!ca || typeof html2canvas === 'undefined') { alert('Error al exportar'); return; }
    html2canvas(ca, {backgroundColor:'#FCFCFC', scale:2, useCORS:true, logging:false}).then(function(canvas) {
        var url = canvas.toDataURL('image/png');
        var a = document.createElement('a');
        a.href = url; a.download = 'eva-chat-' + Date.now() + '.png';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
    }).catch(function(){ alert('No se pudo exportar como imagen'); });
}

</script>
