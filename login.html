<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eva IA - Acceder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .bg-particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(37,99,235,0.3);
            border-radius: 50%;
            animation: float 6s infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }
        .login-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #2563EB, #7C3AED);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .logo-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .logo-subtitle {
            font-size: 13px;
            color: #888;
        }
        .input-group {
            margin-bottom: 16px;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            font-size: 14px;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .input-group input::placeholder { color: #555; }
        .password-toggle {
            position: absolute;
            right: 16px;
            bottom: 14px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 12px;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2563EB;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .checkbox-group label {
            font-size: 12px;
            color: #888;
            line-height: 1.5;
        }
        .checkbox-group a {
            color: #2563EB;
            text-decoration: none;
            font-weight: 500;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #2563EB, #1D4ED8);
            color: #fff;
            margin-bottom: 12px;
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #555;
            font-size: 11px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2a2a;
        }
        .error-message {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            color: #EF4444;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }
        .success-message {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            color: #10B981;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }
        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
        .toggle-text a {
            color: #2563EB;
            font-weight: 600;
            text-decoration: none;
        }
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="login-container">
    <div class="login-card">
        <div class="logo-section">
            <div class="logo-icon">🧠</div>
            <div class="logo-title">Eva IA</div>
            <div class="logo-subtitle">Tu asistente inteligente personal</div>
        </div>
        
        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>
        
        <div class="input-group">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
        </div>
        
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password">
            <button class="password-toggle" onclick="togglePassword()" id="passToggle">Mostrar</button>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="acceptTerms" onchange="updateButton()">
            <label>Acepto los <a href="#" onclick="showTerms(event)">Términos y Condiciones</a> y la <a href="#" onclick="showPrivacy(event)">Política de Privacidad</a> de Eva IA</label>
        </div>
        
        <button class="btn btn-primary" onclick="handleAuth()" id="authBtn" disabled>Iniciar Sesión</button>
        
        <div class="divider">o continuar con</div>
        
        <button class="btn btn-outline" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
        </button>
        
        <p class="toggle-text">
            <span id="toggleText">¿No tienes cuenta?</span>
            <a href="#" onclick="toggleMode()" id="toggleLink">Regístrate</a>
        </p>
        
        <p class="footer-text">
            Al continuar, aceptas nuestros Términos de Servicio.<br>
            Protegido por reCAPTCHA y las Políticas de Privacidad.
        </p>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// ============ CONFIGURACIÓN FIREBASE ============
const firebaseConfig = {
    apiKey: "AIzaSyBiUKBNFkMcW2-5AMPZPxrmtqXzu4rS9ZM",
    authDomain: "gen-lang-client-0059662230.firebaseapp.com",
    projectId: "gen-lang-client-0059662230",
    storageBucket: "gen-lang-client-0059662230.firebasestorage.app",
    messagingSenderId: "146794930401",
    appId: "1:146794930401:web:8eb012b2c3302b8381d7a0"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ============ PARTÍCULAS DE FONDO ============
function createParticles() {
    var container = document.getElementById('particles');
    for (var i = 0; i < 30; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 6 + 's';
        p.style.animationDuration = (4 + Math.random() * 8) + 's';
        container.appendChild(p);
    }
}
createParticles();

// ============ MODO LOGIN/REGISTRO ============
var isLogin = true;

function toggleMode() {
    isLogin = !isLogin;
    if (isLogin) {
        document.getElementById('authBtn').textContent = 'Iniciar Sesión';
        document.getElementById('toggleText').textContent = '¿No tienes cuenta?';
        document.getElementById('toggleLink').textContent = 'Regístrate';
    } else {
        document.getElementById('authBtn').textContent = 'Crear Cuenta';
        document.getElementById('toggleText').textContent = '¿Ya tienes cuenta?';
        document.getElementById('toggleLink').textContent = 'Inicia Sesión';
    }
    hideMessages();
}

function updateButton() {
    var btn = document.getElementById('authBtn');
    var checked = document.getElementById('acceptTerms').checked;
    btn.disabled = !checked;
    btn.style.opacity = checked ? '1' : '0.4';
}

function togglePassword() {
    var pass = document.getElementById('password');
    var btn = document.getElementById('passToggle');
    if (pass.type === 'password') {
        pass.type = 'text';
        btn.textContent = 'Ocultar';
    } else {
        pass.type = 'password';
        btn.textContent = 'Mostrar';
    }
}

function hideMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
}

function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
    var el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
}

function showTerms(e) {
    e.preventDefault();
    alert('TÉRMINOS Y CONDICIONES DE EVA IA\n\n1. Uso del servicio: Eva IA es un asistente virtual gratuito.\n2. Datos: No compartimos tu información con terceros.\n3. Responsabilidad: Eva puede cometer errores, verifica sus respuestas.\n4. Edad: Debes ser mayor de 13 años para usar el servicio.');
}

function showPrivacy(e) {
    e.preventDefault();
    alert('POLÍTICA DE PRIVACIDAD\n\nTus datos están seguros con Firebase Authentication.\nNo almacenamos contraseñas en nuestros servidores.\nPuedes solicitar la eliminación de tu cuenta en cualquier momento.');
}

// ============ AUTENTICACIÓN ============
function handleAuth() {
    hideMessages();
    
    if (!document.getElementById('acceptTerms').checked) {
        showError('Debes aceptar los Términos y Condiciones');
        return;
    }
    
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    
    if (!email) { showError('Ingresa tu correo electrónico'); return; }
    if (!password) { showError('Ingresa tu contraseña'); return; }
    if (password.length < 6) { showError('La contraseña debe tener al menos 6 caracteres'); return; }
    
    var btn = document.getElementById('authBtn');
    btn.disabled = true;
    btn.textContent = 'Procesando...';
    
    if (isLogin) {
        auth.signInWithEmailAndPassword(email, password)
            .then(function() {
                showSuccess('¡Bienvenido! Redirigiendo...');
                setTimeout(function() { window.location.href = 'index.html'; }, 800);
            })
            .catch(function(e) {
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
                updateButton();
                if (e.code === 'auth/user-not-found') showError('No existe una cuenta con este correo');
                else if (e.code === 'auth/wrong-password') showError('Contraseña incorrecta');
                else showError(e.message);
            });
    } else {
        auth.createUserWithEmailAndPassword(email, password)
            .then(function() {
                showSuccess('¡Cuenta creada! Redirigiendo...');
                setTimeout(function() { window.location.href = 'index.html'; }, 800);
            })
            .catch(function(e) {
                btn.disabled = false;
                btn.textContent = 'Crear Cuenta';
                updateButton();
                if (e.code === 'auth/email-already-in-use') showError('Este correo ya está registrado');
                else if (e.code === 'auth/weak-password') showError('Contraseña muy débil');
                else showError(e.message);
            });
    }
}

function loginWithGoogle() {
    if (!document.getElementById('acceptTerms').checked) {
        showError('Debes aceptar los Términos y Condiciones');
        return;
    }
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
        .then(function() { window.location.href = 'index.html'; })
        .catch(function(e) { showError(e.message); });
}

// Redirigir si ya está logueado
auth.onAuthStateChanged(function(user) {
    if (user) window.location.href = 'index.html';
});
</script>

</body>
</html>
