<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eva - Iniciar Sesión</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #D48A72, #e8a87c);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        h1 { font-size: 24px; font-weight: 800; color: #111; margin-bottom: 4px; }
        .subtitle { color: #999; font-size: 13px; margin-bottom: 28px; }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #2563EB; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }
        .btn-primary { background: #2563EB; color: #fff; }
        .btn-primary:active { opacity: 0.8; }
        .btn-google {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .toggle-text { margin-top: 16px; font-size: 12px; color: #999; }
        .toggle-text a { color: #2563EB; font-weight: 600; text-decoration: none; }
        .error-msg { color: #EF4444; font-size: 12px; margin-bottom: 8px; display: none; }
        .success-msg { color: #10B981; font-size: 12px; margin-bottom: 8px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">E</div>
    <h1>Bienvenido a Eva</h1>
    <p class="subtitle">Tu asistente IA personal</p>
    
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">
    
    <button class="btn btn-primary" onclick="handleEmailAuth()" id="authBtn">Iniciar Sesión</button>
    
    <button class="btn btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
    </button>
    
    <p class="toggle-text">
        <span id="toggleText">¿No tienes cuenta?</span>
        <a href="#" onclick="toggleMode()" id="toggleLink">Regístrate</a>
    </p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// Configuración de Firebase
const firebaseConfig = {
    apiKey: "AIzaSyBiUKBNFkMcW2-5AMPZPxrmtqXzu4rS9ZM",
    authDomain: "gen-lang-client-0059662230.firebaseapp.com",
    projectId: "gen-lang-client-0059662230",
    storageBucket: "gen-lang-client-0059662230.firebasestorage.app",
    messagingSenderId: "146794930401",
    appId: "1:146794930401:web:8eb012b2c3302b8381d7a0"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

var isLoginMode = true;

function toggleMode() {
    isLoginMode = !isLoginMode;
    if (isLoginMode) {
        document.getElementById('authBtn').textContent = 'Iniciar Sesión';
        document.getElementById('toggleText').textContent = '¿No tienes cuenta?';
        document.getElementById('toggleLink').textContent = 'Regístrate';
    } else {
        document.getElementById('authBtn').textContent = 'Crear Cuenta';
        document.getElementById('toggleText').textContent = '¿Ya tienes cuenta?';
        document.getElementById('toggleLink').textContent = 'Inicia Sesión';
    }
    hideMessages();
}

function hideMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
}

function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
    var el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
}

function handleEmailAuth() {
    hideMessages();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    
    if (!email || !password) {
        showError('Completa todos los campos');
        return;
    }
    
    if (isLoginMode) {
        // Iniciar sesión
        auth.signInWithEmailAndPassword(email, password)
            .then(function(result) {
                showSuccess('¡Bienvenido! Redirigiendo...');
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1000);
            })
            .catch(function(error) {
                showError(error.message);
            });
    } else {
        // Registrarse
        auth.createUserWithEmailAndPassword(email, password)
            .then(function(result) {
                showSuccess('¡Cuenta creada! Redirigiendo...');
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1000);
            })
            .catch(function(error) {
                showError(error.message);
            });
    }
}

function loginWithGoogle() {
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
        .then(function(result) {
            window.location.href = 'index.html';
        })
        .catch(function(error) {
            showError(error.message);
        });
}

// Verificar si ya está logueado
auth.onAuthStateChanged(function(user) {
    if (user) {
        window.location.href = 'index.html';
    }
});
</script>

</body>
</html>
